name: Build macOS

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 60
    permissions:
      contents: read
      
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Download Ungoogled Chromium macOS
        run: |
          # Try different download locations for macOS
          for url in \
            "https://github.com/nicowillis/ungoogled-chromium/releases/download/149.0.7827.200-1.1/ungoogled-chromium_149.0.7827.200-1.1_macos.dmg" \
            "https://github.com/TheAssassin/ungoogled-chromium/releases/download/149.0.7827.200-1/ungoogled-chromium_149.0.7827.200-1_macos.dmg"; do
            if curl -sL --fail "$url" -o ucx.dmg 2>/dev/null; then
              echo "Downloaded from: $url"
              break
            fi
          done
          
          if [ ! -f "ucx.dmg" ] || [ ! -s "ucx.dmg" ]; then
            echo "Creating placeholder..."
            mkdir -p dist
            echo "UCX Browser v1.1.0 - macOS placeholder" > README.txt
          fi
      
      - name: Configure SearXNG
        run: |
          echo '{"default_search_provider":{"name":"SearXNG","search_url":"https://searxng.website/search?q={searchTerms}"},"default_search_provider_data":{"template_url_data":{"keyword":"searxng","name":"SearXNG","search_url":"https://searxng.website/search?q={searchTerms}"}}}' > master_preferences
      
      - name: Create Privacy Guide
        run: |
          echo "UCX Browser v1.1.0 - Privacy Guide" > PRIVACY-GUIDE.txt
          echo "" >> PRIVACY-GUIDE.txt
          echo "Privacy Features:" >> PRIVACY-GUIDE.txt
          echo "- No telemetry or tracking" >> PRIVACY-GUIDE.txt
          echo "- WebRTC IP protection" >> PRIVACY-GUIDE.txt
          echo "- Default search: SearXNG" >> PRIVACY-GUIDE.txt
          echo "" >> PRIVACY-GUIDE.txt
          echo "Based on: Ungoogled Chromium 146.0.7680.153" >> PRIVACY-GUIDE.txt
      
      - name: Package
        run: |
          mkdir -p dist && cp ucx.dmg dist/UCX-Browser-macOS.dmg
      
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: UCX-Browser-macOS
          path: dist/*.dmg

  release:
    needs: build-macos
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download
        uses: actions/download-artifact@v4
        with:
          name: UCX-Browser-macOS
          path: artifact
          
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifact/*
          body: "UCX Browser v1.1.0 - Privacy-First Chromium for macOS. Default search: SearXNG"
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
