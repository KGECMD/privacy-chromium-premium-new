name: Build macOS

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-macos-intel:
    runs-on: macos-13
    timeout-minutes: 720
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Install Python
        run: brew install python@3.11
        
      - name: Install depot_tools
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git depot_tools
          echo "$GITHUB_WORKSPACE/depot_tools" >> $GITHUB_PATH
          
      - name: Fetch Chromium
        run: |
          mkdir -p chromium
          cd chromium
          fetch --nohooks chromium
          cd src
          git checkout $(cat ../../revision.txt)
          
      - name: Apply Patches
        run: |
          cd ../..
          python3 utils/patches.py apply -s src/
          
      - name: Build
        run: |
          cd src
          gn gen out/Release --args="is_official_build=true symbol_level=0"
          ninja -C out/Release chrome
          
      - name: Package DMG
        run: |
          mkdir -p dist
          hdiutil create -volname "UCX Browser" -srcfolder src/out/Release -ov -format UDZO dist/UCX-Browser-macOS-x64.dmg
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: UCX-Browser-macOS-intel
          path: dist/*.dmg
          retention-days: 30
          
  build-macos-arm64:
    runs-on: macos-14
    timeout-minutes: 720
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Install Python
        run: brew install python@3.11
        
      - name: Install depot_tools
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git depot_tools
          echo "$GITHUB_WORKSPACE/depot_tools" >> $GITHUB_PATH
          
      - name: Fetch Chromium
        run: |
          mkdir -p chromium
          cd chromium
          fetch --nohooks chromium
          cd src
          git checkout $(cat ../../revision.txt)
          
      - name: Apply Patches
        run: |
          cd ../..
          python3 utils/patches.py apply -s src/
          
      - name: Build
        run: |
          cd src
          gn gen out/Release --args="is_official_build=true symbol_level=0 target_cpu=\"arm64\""
          ninja -C out/Release chrome
          
      - name: Package DMG
        run: |
          mkdir -p dist
          hdiutil create -volname "UCX Browser" -srcfolder src/out/Release -ov -format UDZO dist/UCX-Browser-macOS-arm64.dmg
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: UCX-Browser-macOS-arm64
          path: dist/*.dmg
          retention-days: 30
          
  release:
    needs: [build-macos-intel, build-macos-arm64]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*.dmg
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
