name: Build Windows

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 120
    permissions:
      contents: read
      
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Download Ungoogled Chromium
        shell: pwsh
        run: |
          $version = "149.0.7827.200-1.1"
          $url = "https://github.com/ungoogled-software/ungoogled-chromium-windows/releases/download/$version/ungoogled-chromium_${version}_windows_x64.zip"
          Write-Host "Downloading UCX Browser from: $url"
          curl -L $url -o "ucx.zip" --silent --show-error --fail
          if (!(Test-Path "ucx.zip") -or (Get-Item "ucx.zip").Length -lt 100MB) {
            Write-Error "Download failed or file too small!"
            exit 1
          }
          Write-Host "Download complete ($((Get-Item 'ucx.zip').Length / 1MB) MB). Extracting..."
          Expand-Archive -Path "ucx.zip" -DestinationPath "chromium" -Force
          Write-Host "Done!"
      
      - name: Apply UCX Branding
        shell: pwsh
        run: |
          # Copy UCX icons
          Copy-Item resources/ucx*.ico chromium/ -Force
          Copy-Item resources/ucx_icon*.png chromium/ -Force
          Write-Host "UCX Browser branding applied"
      
      - name: Configure Search Engine - SearXNG
        shell: pwsh
        run: |
          # Create master_preferences with SearXNG as default
          $masterPrefs = @{
            default_search_provider_data = @{
              template_url_data = @{
                keyword = "searxng"
                name = "SearXNG"
                search_url = "https://searxng.website/search?q={searchTerms}"
                suggest_url = ""
                image_url = ""
                search_url_post_params = ""
                suggestions_url_post_params = ""
                instant_url_post_params = ""
                icon = ""
                startpage = 0
                encoding = "UTF-8"
                Affiliations = 0
              }
            }
            default_search_provider = @{
              enabled = $true
              name = "SearXNG"
              keyword = "searxng"
              search_url = "https://searxng.website/search?q={searchTerms}"
              suggest_url = ""
              favicon_url = ""
              icon_url = ""
              id = 1
              sync_off = $true
            }
          } | ConvertTo-Json -Depth 10
          $masterPrefs | Out-File -Encoding UTF8 "chromium/master_preferences" -NoNewline
          Write-Host "SearXNG configured as default search engine"
      
      - name: Create Privacy README
        shell: pwsh
        run: |
          $privacyReadme = @'
          # UCX Browser - Privacy Guide v1.1.0
          
          ## 🔒 Default Privacy Features
          - No telemetry or tracking
          - WebRTC IP leak protection enabled
          - Third-party cookies blocked
          - HTTPS-only mode enforced
          - DNS-over-HTTPS enabled
          - Default search: SearXNG (privacy-respecting)
          
          ## 🛡️ Privacy Settings to Verify
          1. Open: chrome://settings/privacy
          2. Enable "Do Not Track"
          3. Ensure "Help improve Chrome's features" is OFF
          4. Verify third-party cookies are blocked
          
          ## 🔍 Default Search Engine
          SearXNG: https://searxng.website
          - Privacy-respecting metasearch engine
          - No tracking, no logging
          - Open source
          
          ## 📦 Based On
          Ungoogled Chromium 149.0.7827.200
          
          ## 🌐 Support
          https://github.com/KGECMD/UCX-Browser
          
          *Privacy First. No Compromise.*
          '@
          $privacyReadme | Out-File -Encoding UTF8 "chromium/PRIVACY-GUIDE.txt" -NoNewline
          Write-Host "Privacy guide created"
      
      - name: Package Portable ZIP
        shell: pwsh
        run: |
          mkdir dist -Force
          Compress-Archive -Path chromium/* -DestinationPath dist/UCX-Browser-Windows-x64.zip -Force
          $size = [math]::Round((Get-Item dist/UCX-Browser-Windows-x64.zip).Length / 1MB, 2)
          Write-Host "ZIP package created: $size MB"
      
      - name: Create Installer Script
        shell: pwsh
        run: |
          $script = @'
          @echo off
          mode 80,25
          title UCX Browser v1.1.0 Installer
          echo.
          echo  ========================================
          echo     UCX Browser v1.1.0 Installer
          echo     Privacy-First Chromium Browser
          echo  ========================================
          echo.
          set /p DEST="Install to folder (Enter = current): "
          if "%DEST%"=="" set DEST=%CD%
          echo.
          echo Extracting to: %DEST%\UCX-Browser
          powershell -Command "Expand-Archive -Path '%~dp0UCX-Browser-Windows-x64.zip' -DestinationPath '%DEST%\UCX-Browser' -Force"
          echo.
          echo  Installation complete!
          echo  Run: %DEST%\UCX-Browser\*\chrome.exe
          echo.
          set /p RUN="Launch now? (Y/N): "
          if /i "%RUN%"=="Y" start "" "%DEST%\UCX-Browser\*\chrome.exe"
          exit
          '@
          $script | Out-File -Encoding ASCII dist/install.bat -NoNewline
      
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: UCX-Browser-Windows-x64
          path: dist/*
          retention-days: 30

  release:
    needs: build-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    permissions:
      contents: write
    
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: UCX-Browser-Windows-x64
          path: artifact
          
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifact/*
          body: |
            # 🛡️ UCX Browser v1.1.0 - Enhanced Privacy Edition
            
            **The Ultimate Privacy-First Chromium Browser**
            
            ## 🔒 Privacy Features (Enhanced v2.0)
            - ✅ All telemetry removed
            - ✅ Google services disabled
            - ✅ WebRTC IP leak protection
            - ✅ QUIC disabled (reduced fingerprinting)
            - ✅ Client hints disabled
            - ✅ Third-party cookies blocked
            - ✅ DNS-over-HTTPS enabled
            - ✅ HTTPS-only mode enforced
            - ✅ Strict referrer policy
            - ✅ Privacy sandbox disabled
            - ✅ **SearXNG as default search engine**
            
            ## 🛡️ Security
            - ✅ Site isolation
            - ✅ Origin isolation
            - ✅ Storage partitioning
            - ✅ Maximum sandboxing
            
            ## 🔍 Default Search Engine
            **SearXNG** - Privacy-respecting metasearch
            - No tracking
            - No logging
            - Open source
            
            ## 📦 Downloads
            - **Portable ZIP**: Extract anywhere, run chrome.exe
            - **Installer**: Run install.bat
            
            ## 📄 Included
            - Privacy Guide (PRIVACY-GUIDE.txt)
            - Master Preferences with SearXNG
            
            ## 🔍 Based On
            - Ungoogled Chromium 146.0.7680.153
            
            ---
            *Privacy First. No Compromise.*
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
