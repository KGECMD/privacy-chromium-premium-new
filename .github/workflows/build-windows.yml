name: Build Windows

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Download Ungoogled Chromium
        shell: pwsh
        run: |
          $version = "149.0.7827.200"
          $url = "https://sourceforge.net/projects/ungoogled-chromium-win.mirror/files/$version/ungoogled-chromium-$version.windows-x64.zip/download"
          Write-Host "Downloading UC..."
          Invoke-WebRequest -Uri $url -OutFile "ucx.zip" -UserAgent "Mozilla/5.0"
          Expand-Archive -Path "ucx.zip" -DestinationPath "chromium" -Force
          Write-Host "Extracted!"
          ls -Recurse chromium | Select-Object FullName
      
      - name: Apply UCX Branding
        shell: pwsh
        run: |
          # Copy UCX icons
          Copy-Item resources/ucx*.ico chromium/ -Force
          # Update version info placeholder
          Write-Host "UCX Browser branding applied"
      
      - name: Package
        run: |
          mkdir dist -Force
          Compress-Archive -Path chromium/* -DestinationPath dist/UCX-Browser-Windows-x64.zip -Force
      
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: UCX-Browser-Windows-x64
          path: dist/*.zip
          retention-days: 30

  release:
    needs: build-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: UCX-Browser-Windows-x64
          path: artifact
          
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifact/*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
