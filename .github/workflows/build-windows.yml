name: Build Windows

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 720
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install depot_tools
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git "$env:TEMP\depot_tools"
          Add-Content $env:GITHUB_PATH "$env:TEMP\depot_tools"
          
      - name: Fetch Chromium
        run: |
          mkdir chromium
          cd chromium
          fetch --nohooks chromium
          cd src
          $version = Get-Content ../../revision.txt
          git checkout $version
          
      - name: Apply Patches
        run: |
          cd ../..
          python utils/patches.py apply -s src/
          
      - name: Build
        run: |
          cd src
          gn gen out/Release --args="is_official_build=true symbol_level=0"
          ninja -C out/Release chrome chrome.exe
          
      - name: Package
        run: |
          mkdir ../dist
          Compress-Archive -Path src/out/Release/chrome.exe -DestinationPath ../dist/UCX-Browser-Windows-x64.zip -Force
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: UCX-Browser-Windows-x64
          path: dist/*.zip
          retention-days: 30
          
  release:
    needs: build-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: UCX-Browser-Windows-x64
          path: artifact
          
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifact/*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
